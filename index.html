<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyberpunk Scarab World with Bloom & Interaction</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }
  </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  class CyberpunkWorld {
    constructor() {
      this.scene = new THREE.Scene();
      this.scene.fog = new THREE.FogExp2(0x0a0015, 0.07);

      this.camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 200);
      this.camera.position.set(0, 4, 12);

      this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      this.renderer.setPixelRatio(devicePixelRatio * 0.9);
      this.renderer.setSize(innerWidth, innerHeight);
      this.renderer.toneMapping = THREE.ReinhardToneMapping;
      this.renderer.toneMappingExposure = 1.15;
      document.body.appendChild(this.renderer.domElement);

      // Post-processing
      this.composer = new EffectComposer(this.renderer);
      const renderPass = new RenderPass(this.scene, this.camera);
      this.composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        1.7,    // strength — higher = bigger/more intense glow
        0.45,   // radius — spread of glow
        0.2     // threshold — lower = more things glow (good for neon/emissive)
      );
      this.composer.addPass(bloomPass);

      // Controls
      this.controls = new OrbitControls(this.camera, this.renderer.domElement);
      this.controls.enableDamping = true;
      this.controls.dampingFactor = 0.05;

      // Lights (cyberpunk neon)
      this.scene.add(new THREE.AmbientLight(0x404060, 0.5));

      const blue = new THREE.PointLight(0x00f0ff, 40, 80); blue.position.set(10, 8, 10); this.scene.add(blue);
      const pink = new THREE.PointLight(0xff00cc, 35, 80); pink.position.set(-10, 10, 5); this.scene.add(pink);

      // Example scarab group (replace with your swarm logic)
      this.scarabGroup = new THREE.Group();
      this.scene.add(this.scarabGroup);

      // Example "core" object that can be clicked
      const coreGeo = new THREE.OctahedronGeometry(1.2, 0);
      const coreMat = new THREE.MeshStandardMaterial({
        color: 0x00ffcc,
        emissive: 0x00ffcc,
        emissiveIntensity: 12,          // high value → strong bloom
        metalness: 0.9,
        roughness: 0.1
      });
      this.core = new THREE.Mesh(coreGeo, coreMat);
      this.core.name = "core";
      this.core.position.set(0, 0, 0);
      this.scarabGroup.add(this.core);

      // Raycaster setup
      this.raycaster = new THREE.Raycaster();
      this.pointer = new THREE.Vector2();

      // Event listeners
      window.addEventListener('resize', () => this.onResize());
      window.addEventListener('click', (e) => this.onClick(e));

      this.time = 0;
      this.render();
    }

    onResize() {
      this.camera.aspect = innerWidth / innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(innerWidth, innerHeight);
      this.composer.setSize(innerWidth, innerHeight);
    }

    onClick(event) {
      // Normalize mouse coords (-1 to +1)
      this.pointer.x = (event.clientX / innerWidth) * 2 - 1;
      this.pointer.y = -(event.clientY / innerHeight) * 2 + 1;

      this.raycaster.setFromCamera(this.pointer, this.camera);

      // recursive: true → checks children too (important for groups/models)
      const intersects = this.raycaster.intersectObjects(this.scene.children, true);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        if (hit.name === "core") {
          // Trigger meltdown visuals
          hit.material.emissive.setHex(0xff0000);     // bright red
          hit.material.emissiveIntensity = 25;        // extreme glow
          hit.material.color.setHex(0xff3333);

          console.log("CRITICAL CORE DAMAGE — MELTDOWN INITIATED");

          // Optional: pulse animation or particles later
        }
      }
    }

    animateScarab(time) {
      // Your scarab swarm logic here — example simple rotation + bob
      this.scarabGroup.rotation.y = time * 0.0003;
      this.scarabGroup.position.y = Math.sin(time * 0.001) * 0.4;

      // If you have many scarabs:
      // this.scarabGroup.children.forEach((b, i) => {
      //   b.rotation.x += 0.02 + Math.sin(time * 0.003 + i) * 0.01;
      //   ...
      // });
    }

    render() {
      const time = performance.now();

      requestAnimationFrame(() => this.render());

      if (this.scarabGroup) {
        this.animateScarab(time);
      }

      this.controls.update();

      this.composer.render();  // ← uses bloom
      // Do NOT use this.renderer.render() here if you want bloom
    }
  }

  // Start the world
  new CyberpunkWorld();
</script>
</body>
</html>
